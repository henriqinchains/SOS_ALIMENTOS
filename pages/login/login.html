<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOS ALIMENTOS</title>
    <link rel="stylesheet" href="login.css" />
</head>

<body>
    <main class="page-shell">
        <section id="login-section" class="login-card">
            <div class="selo" aria-hidden="true">acesso<br>interno</div>

            <p class="eyebrow">Bem-vindo</p>
            <h1><span>SOS</span> ALIMENTOS🍎</h1>
            <p class="subtitle">Acesse sua conta para continuar.</p>

            <form id="login-form">
                <label for="usuario-login">Usuário</label>
                <input type="text" id="usuario-login" name="usuario" placeholder="Digite seu usuário" required />

                <label for="senha-login">Senha</label>
                <input type="password" id="senha-login" name="senha" placeholder="Digite sua senha" required />

                <button type="submit" id="login-button">Entrar</button>
                <p id="login-message" aria-live="polite" style="display: none"></p>

                <div class="opcoes-extras"></div>
            </form>
        </section>
    </main>
    <script src="login.js" defer></script>
</body>

</html>
